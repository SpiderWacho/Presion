<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Presión — Mel</title>
<style>
  :root {
    --bg: #FDF8F3;
    --surface: #FFFFFF;
    --surface-alt: #F5EFE8;
    --border: #E8DDD2;
    --text: #2C1F14;
    --text-muted: #9C8470;
    --accent: #B85C38;
    --accent-light: #F5E8E2;
    --accent-dark: #8C4028;
    --green: #2E7D52;
    --green-light: #E3F2EA;
    --yellow: #A06B10;
    --yellow-light: #FEF3DC;
    --red: #C0392B;
    --red-light: #FDEBEA;
    --blue: #1A5C8C;
    --blue-light: #E3EEF8;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 20px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .greeting {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .app-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
  }
  .app-title span { color: var(--accent); }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 70px;
    z-index: 9;
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    user-select: none;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Screens */
  .screen { display: none; padding: 20px; }
  .screen.active { display: block; }

  /* Log form */
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
    margin-top: 20px;
    display: block;
  }
  .form-label:first-child { margin-top: 0; }

  .fields-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .field-wrap { display: flex; flex-direction: column; gap: 4px; }
  .field-sublabel {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }
  .bp-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 6px;
    font-size: 24px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
    transition: border-color 0.15s;
  }
  .bp-input::-webkit-inner-spin-button,
  .bp-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .bp-input:focus { border-color: var(--accent); }

  .notes-input {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    color: var(--text);
    font-family: inherit;
    resize: none;
    outline: none;
    transition: border-color 0.15s;
    min-height: 72px;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--text-muted); }

  .save-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 15px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .save-btn:active { background: var(--accent-dark); transform: scale(0.98); }

  .toast {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* History */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 15px;
  }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .reading-main {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    min-width: 100px;
    line-height: 1;
  }
  .reading-pulse {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    margin-top: 3px;
  }
  .reading-meta { flex: 1; }
  .reading-date { font-size: 12px; color: var(--text-muted); }
  .reading-note { font-size: 13px; color: var(--text); margin-top: 2px; }

  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .s-normal { background: var(--green-light); color: var(--green); }
  .s-elevated { background: var(--yellow-light); color: var(--yellow); }
  .s-high1 { background: #FDECEA; color: #C0392B; }
  .s-high2 { background: #F5C6C6; color: #922B21; }
  .s-low { background: var(--blue-light); color: var(--blue); }

  .delete-btn {
    background: none;
    border: none;
    color: var(--border);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .delete-btn:active { color: var(--red); }

  /* Trend */
  .trend-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .trend-title { font-size: 16px; font-weight: 600; }
  .period-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    cursor: pointer;
  }

  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 12px 12px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .chart-wrap svg { width: 100%; display: block; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .ref-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .ref-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .ref-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .ref-row:last-child { border-bottom: none; }
  .ref-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ref-name { flex: 1; color: var(--text); }
  .ref-range { color: var(--text-muted); font-size: 12px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 10;
  }
  .nav-btn {
    flex: 1;
    padding: 10px 8px 14px;
    text-align: center;
    cursor: pointer;
    border: none;
    background: none;
    font-family: inherit;
    transition: background 0.1s;
    user-select: none;
  }
  .nav-icon { font-size: 22px; line-height: 1; }
  .nav-label { font-size: 11px; font-weight: 500; margin-top: 3px; color: var(--text-muted); }
  .nav-btn.active .nav-label { color: var(--accent); }
  .nav-btn.active .nav-icon { filter: none; }
</style>
</head>
<body>

<div class="header">
  <div class="greeting">Hola, Mel 👋</div>
  <div class="app-title">Control de <span>presión</span></div>
</div>

<div class="toast" id="toast">Registro guardado</div>

<!-- Screen: Log -->
<div class="screen active" id="screen-log">
  <span class="form-label">Nueva medición</span>
  <div class="fields-row">
    <div class="field-wrap">
      <input class="bp-input" type="number" id="sys" placeholder="120" min="60" max="250">
      <div class="field-sublabel">Sistólica</div>
    </div>
    <div class="field-wrap">
      <input class="bp-input" type="number" id="dia" placeholder="80" min="40" max="150">
      <div class="field-sublabel">Diastólica</div>
    </div>
    <div class="field-wrap">
      <input class="bp-input" type="number" id="pul" placeholder="72" min="30" max="200">
      <div class="field-sublabel">Pulso</div>
    </div>
  </div>

  <span class="form-label" style="margin-top:18px;">Notas <span style="font-weight:400;text-transform:none;letter-spacing:0;">(opcional)</span></span>
  <textarea class="notes-input" id="notes" placeholder="Ej: en reposo, después de caminar, con estrés…"></textarea>

  <button class="save-btn" onclick="saveReading()">Guardar medición</button>
</div>

<!-- Screen: History -->
<div class="screen" id="screen-history">
  <div id="history-list"></div>
</div>

<!-- Screen: Trend -->
<div class="screen" id="screen-trend">
  <div class="trend-header">
    <div class="trend-title">Tendencia</div>
    <select class="period-select" id="period-select" onchange="renderTrend()">
      <option value="14">14 días</option>
      <option value="30" selected>30 días</option>
      <option value="90">3 meses</option>
    </select>
  </div>

  <div class="chart-wrap">
    <svg id="trend-chart" viewBox="0 0 320 140" preserveAspectRatio="none"></svg>
  </div>

  <div class="stats-grid" id="stats-grid"></div>

  <div class="ref-card">
    <div class="ref-title">Valores de referencia (mmHg)</div>
    <div class="ref-row"><div class="ref-dot" style="background:#2E7D52"></div><div class="ref-name">Normal</div><div class="ref-range">&lt; 120 / &lt; 80</div></div>
    <div class="ref-row"><div class="ref-dot" style="background:#A06B10"></div><div class="ref-name">Elevada</div><div class="ref-range">120–129 / &lt; 80</div></div>
    <div class="ref-row"><div class="ref-dot" style="background:#C0392B"></div><div class="ref-name">Alta estadio 1</div><div class="ref-range">130–139 / 80–89</div></div>
    <div class="ref-row"><div class="ref-dot" style="background:#922B21"></div><div class="ref-name">Alta estadio 2</div><div class="ref-range">≥ 140 / ≥ 90</div></div>
    <div class="ref-row"><div class="ref-dot" style="background:#1A5C8C"></div><div class="ref-name">Baja</div><div class="ref-range">&lt; 90 / &lt; 60</div></div>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-log" onclick="switchTab('log')">
    <div class="nav-icon">➕</div>
    <div class="nav-label">Registrar</div>
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
    <div class="nav-icon">📋</div>
    <div class="nav-label">Historial</div>
  </button>
  <button class="nav-btn" id="nav-trend" onclick="switchTab('trend')">
    <div class="nav-icon">📈</div>
    <div class="nav-label">Tendencia</div>
  </button>
</div>

<script>
  const STORAGE_KEY = 'mel_bp_readings';

  function loadReadings() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }

  function saveReadings(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function classify(sys, dia) {
    if (sys < 90 || dia < 60) return { label: 'Baja', cls: 's-low' };
    if (sys < 120 && dia < 80) return { label: 'Normal', cls: 's-normal' };
    if (sys < 130 && dia < 80) return { label: 'Elevada', cls: 's-elevated' };
    if (sys < 140 && dia < 90) return { label: 'Alta E1', cls: 's-high1' };
    return { label: 'Alta E2', cls: 's-high2' };
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const today = now.toDateString();
    const yesterday = new Date(now - 86400000).toDateString();
    const time = d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    if (d.toDateString() === today) return `Hoy, ${time}`;
    if (d.toDateString() === yesterday) return `Ayer, ${time}`;
    return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'short' }) + `, ${time}`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function saveReading() {
    const sys = parseInt(document.getElementById('sys').value);
    const dia = parseInt(document.getElementById('dia').value);
    const pul = parseInt(document.getElementById('pul').value);
    const notes = document.getElementById('notes').value.trim();

    if (!sys || !dia || isNaN(sys) || isNaN(dia)) {
      showToast('Ingresá sistólica y diastólica');
      return;
    }
    if (sys < 60 || sys > 250 || dia < 40 || dia > 150) {
      showToast('Valores fuera de rango');
      return;
    }

    const readings = loadReadings();
    readings.unshift({ id: Date.now(), date: new Date().toISOString(), sys, dia, pul: isNaN(pul) ? null : pul, notes });
    saveReadings(readings);

    document.getElementById('sys').value = '';
    document.getElementById('dia').value = '';
    document.getElementById('pul').value = '';
    document.getElementById('notes').value = '';

    showToast('Registro guardado ✓');
  }

  function deleteReading(id) {
    if (!confirm('¿Eliminar este registro?')) return;
    const readings = loadReadings().filter(r => r.id !== id);
    saveReadings(readings);
    renderHistory();
  }

  function renderHistory() {
    const readings = loadReadings();
    const el = document.getElementById('history-list');
    if (!readings.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">💓</div>Todavía no hay registros.<br>¡Empezá por "Registrar"!</div>';
      return;
    }
    el.innerHTML = readings.map(r => {
      const st = classify(r.sys, r.dia);
      return `<div class="history-item">
        <div>
          <div class="reading-main">${r.sys}/${r.dia}</div>
          ${r.pul ? `<div class="reading-pulse">Pulso ${r.pul} bpm</div>` : ''}
        </div>
        <div class="reading-meta">
          <div class="reading-date">${formatDate(r.date)}</div>
          ${r.notes ? `<div class="reading-note">${r.notes}</div>` : ''}
        </div>
        <span class="status-badge ${st.cls}">${st.label}</span>
        <button class="delete-btn" onclick="deleteReading(${r.id})" title="Eliminar">×</button>
      </div>`;
    }).join('');
  }

  function renderTrend() {
    const days = parseInt(document.getElementById('period-select').value);
    const all = loadReadings();
    const cutoff = new Date(Date.now() - days * 86400000);
    const data = all.filter(r => new Date(r.date) >= cutoff).reverse();

    const svg = document.getElementById('trend-chart');
    const statsEl = document.getElementById('stats-grid');

    if (data.length < 2) {
      svg.innerHTML = `<text x="160" y="75" text-anchor="middle" font-size="13" fill="#9C8470">Hacen falta al menos 2 registros</text>`;
      statsEl.innerHTML = '';
      return;
    }

    const W = 320, H = 140, pad = { t: 12, b: 24, l: 28, r: 10 };
    const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;

    const allVals = data.flatMap(r => [r.sys, r.dia]);
    const minV = Math.min(...allVals) - 8;
    const maxV = Math.max(...allVals) + 8;
    const range = maxV - minV;

    function px(i) { return pad.l + (i / (data.length - 1)) * iw; }
    function py(v) { return pad.t + ih - ((v - minV) / range) * ih; }

    function polyline(key, color) {
      const pts = data.map((r, i) => `${px(i).toFixed(1)},${py(r[key]).toFixed(1)}`).join(' ');
      return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    }
    function dots(key, color) {
      return data.map((r, i) => `<circle cx="${px(i).toFixed(1)}" cy="${py(r[key]).toFixed(1)}" r="3.5" fill="${color}"/>`).join('');
    }

    const gridVals = [];
    const step = range > 60 ? 20 : 10;
    for (let v = Math.ceil(minV / step) * step; v <= maxV; v += step) gridVals.push(v);

    const grid = gridVals.map(v =>
      `<line x1="${pad.l}" y1="${py(v).toFixed(1)}" x2="${W - pad.r}" y2="${py(v).toFixed(1)}" stroke="#E8DDD2" stroke-width="0.8"/>
       <text x="${pad.l - 4}" y="${(py(v) + 4).toFixed(1)}" font-size="9" fill="#9C8470" text-anchor="end">${v}</text>`
    ).join('');

    const labelCount = Math.min(data.length, 4);
    const labelStep = Math.floor((data.length - 1) / (labelCount - 1)) || 1;
    const dateLabels = [];
    for (let i = 0; i < data.length; i += labelStep) {
      const d = new Date(data[i].date);
      const lbl = `${d.getDate()}/${d.getMonth() + 1}`;
      dateLabels.push(`<text x="${px(i).toFixed(1)}" y="${H - 4}" font-size="9" fill="#9C8470" text-anchor="middle">${lbl}</text>`);
    }

    svg.innerHTML = grid + polyline('sys', '#B85C38') + polyline('dia', '#1A5C8C') +
      dots('sys', '#B85C38') + dots('dia', '#1A5C8C') + dateLabels.join('') +
      `<circle cx="60" cy="10" r="4" fill="#B85C38"/>
       <text x="67" y="14" font-size="10" fill="#9C8470">Sistólica</text>
       <circle cx="130" cy="10" r="4" fill="#1A5C8C"/>
       <text x="137" y="14" font-size="10" fill="#9C8470">Diastólica</text>`;

    const avg = arr => (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(0);
    const sysList = data.map(r => r.sys);
    const diaList = data.map(r => r.dia);
    const pulList = data.filter(r => r.pul).map(r => r.pul);

    const last = data[data.length - 1];
    const lastSt = classify(last.sys, last.dia);

    statsEl.innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Promedio sistólica</div>
        <div class="stat-value">${avg(sysList)}</div>
        <div class="stat-sub">mmHg</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Promedio diastólica</div>
        <div class="stat-value">${avg(diaList)}</div>
        <div class="stat-sub">mmHg</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Último registro</div>
        <div class="stat-value">${last.sys}/${last.dia}</div>
        <div class="stat-sub"><span class="status-badge ${lastSt.cls}">${lastSt.label}</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pulso promedio</div>
        <div class="stat-value">${pulList.length ? avg(pulList) : '—'}</div>
        <div class="stat-sub">bpm</div>
      </div>`;
  }

  function switchTab(tab) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + tab).classList.add('active');
    document.getElementById('nav-' + tab).classList.add('active');
    if (tab === 'history') renderHistory();
    if (tab === 'trend') renderTrend();
  }
</script>
</body>
</html>
